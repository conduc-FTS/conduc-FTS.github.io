<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3A3A3A">
<link rel="manifest" href="../manifest_conducteur.json">
<link rel="icon" type="image/png" sizes="192x192" href="../icon-dashboard-192.png">
<script>
if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/sw_dashboard.js").catch(() => {}); }
</script>
<title>FTS — Détail chantier</title>
<link rel="stylesheet" href="../css/dashboard.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
.suivi-calendrier-scroll { overflow-x: auto; margin-top: 8px; }
.suivi-calendrier, .suivi-production { border-collapse: collapse; width: 100%; font-size: 0.8rem; }
.suivi-calendrier th, .suivi-calendrier td,
.suivi-production th, .suivi-production td {
  border: 1px solid var(--border); padding: 6px 10px; text-align: center; white-space: nowrap;
}
.suivi-calendrier th, .suivi-production th { background: var(--anthracite); color: white; font-size: 0.72rem; text-transform: uppercase; }
.suivi-calendrier td:first-child, .suivi-production td:first-child { text-align: left; font-weight: 700; background: #FAFAFA; }
.statut-badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; color: white; }
.statut-TRAVAIL { background: #27AE60; }
.statut-PANNE { background: #C0392B; }
.statut-ARRET { background: #888888; }
.statut-TRANSPORT { background: #3A86FF; }
.retour-lien { display: inline-block; margin-bottom: 4px; color: var(--text-sub); font-size: 0.85rem; text-decoration: none; }
.retour-lien:hover { text-decoration: underline; }
.chantier-jours-badge {
  display: inline-block; background: var(--anthracite); color: var(--fts-yellow);
  font-weight: 800; font-size: 0.8rem; padding: 6px 14px; border-radius: 20px; margin-top: 4px;
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <div style="line-height:1.2">
      <div style="font-weight:800;font-size:1.05rem;color:#fff">DÉTAIL CHANTIER</div>
      <div class="brand-sub">Fondations et Travaux Spéciaux</div>
    </div>
  </div>
  <div class="topbar-actions">
    <div class="user-chip">
      <span class="user-dot" id="userDot"></span>
      <span id="adminAccountInfo">Non connecté</span>
    </div>
  </div>
</header>

<main class="dashboard">

  <a href="../nouveau-chantier/index.html" class="retour-lien">← Retour aux chantiers</a>

  <section class="panel">
    <p class="panel-sub" id="chantierCode" style="margin-bottom:2px"></p>
    <h2 class="panel-title" id="chantierNom">Chargement…</h2>
    <div id="chantierJours"></div>
  </section>

  <section class="panel">
    <h2 class="panel-title">Calendrier matériel</h2>
    <p class="form-status" id="suiviStatus">Chargement du suivi...</p>
    <div id="suiviResultats" hidden>
      <div class="suivi-calendrier-scroll">
        <table class="suivi-calendrier" id="suiviCalendrierTable"></table>
      </div>
    </div>
  </section>

  <section class="panel">
    <h2 class="panel-title">Cadence de production</h2>
    <div id="productionResultats" hidden>
      <table class="suivi-production" id="suiviProductionTable"></table>
      <p class="form-status" id="suiviCadenceMoyenne" style="font-weight:700"></p>
    </div>
  </section>

</main>

<script src="../js/auth.js"></script>
<script src="../js/drive.js"></script>
<script src="../js/sheets.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(window.location.search);
  const chantierId = params.get("id");
  const chantierName = params.get("name") || "";

  const spaceIdx = chantierName.search(/\s/);
  const code = spaceIdx > 0 ? chantierName.slice(0, spaceIdx) : chantierName;
  const nom = spaceIdx > 0 ? chantierName.slice(spaceIdx + 1) : "";
  document.getElementById("chantierCode").textContent = code;
  document.getElementById("chantierNom").textContent = nom || chantierName || "Chantier";
  document.title = `FTS — ${chantierName || "Détail chantier"}`;

  const suiviStatus = document.getElementById("suiviStatus");
  const adminAccountInfo = document.getElementById("adminAccountInfo");
  const userDot = document.getElementById("userDot");

  function escapeHtmlSuivi(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  async function afficherJoursDepuisOuverture() {
    if (!chantierId || !window.FTSDrive) return;
    try {
      const createdTime = await FTSDrive.getFolderCreatedTime(chantierId);
      if (!createdTime) return;
      const jours = Math.floor((Date.now() - new Date(createdTime).getTime()) / 86400000) + 1;
      document.getElementById("chantierJours").innerHTML =
        `<span class="chantier-jours-badge">Chantier actif depuis ${jours > 0 ? jours : 1} jour${jours > 1 ? "s" : ""}</span>`;
    } catch (e) {
      // silencieux : l'info jours est secondaire
    }
  }

  async function chargerSuivi() {
    if (!chantierId) {
      suiviStatus.textContent = "Chantier introuvable (lien invalide).";
      return;
    }
    if (!window.FTSAuth || !FTSAuth.isSignedIn()) {
      suiviStatus.textContent = "Connecte-toi depuis le dashboard principal, puis reviens sur cette page.";
      return;
    }
    if (!window.FTSSheets) { suiviStatus.textContent = "Erreur : module Sheets non chargé."; return; }

    suiviStatus.textContent = "Chargement du suivi...";

    try {
      const { materiel, production } = await FTSSheets.lireSuiviComplet(chantierId, chantierName);
      afficherCalendrierMateriel(materiel);
      afficherProduction(production);
      document.getElementById("suiviResultats").hidden = false;
      document.getElementById("productionResultats").hidden = false;
      suiviStatus.textContent = materiel.length === 0 && production.length === 0
        ? "Aucune donnée pour l'instant — elle apparaîtra après le premier rapport journalier enregistré sur ce chantier."
        : "";
    } catch (err) {
      console.error("Erreur chargement suivi :", err);
      suiviStatus.textContent = `Erreur : ${err.message}`;
    }
  }

  function afficherCalendrierMateriel(lignes) {
    const table = document.getElementById("suiviCalendrierTable");
    if (lignes.length === 0) {
      table.innerHTML = "<tr><td>Aucune donnée matériel enregistrée.</td></tr>";
      return;
    }

    const dates = [...new Set(lignes.map((l) => l.date))];
    const machines = [...new Set(lignes.map((l) => l.machine))];

    const parCase = {};
    lignes.forEach((l) => { parCase[`${l.machine}||${l.date}`] = l; });

    let html = "<tr><th>Machine</th>" + dates.map((d) => `<th>${d}</th>`).join("") + "</tr>";
    machines.forEach((m) => {
      html += `<tr><td>${escapeHtmlSuivi(m)}</td>`;
      dates.forEach((d) => {
        const l = parCase[`${m}||${d}`];
        if (l) {
          html += `<td><span class="statut-badge statut-${l.statut}">${l.statut}${l.ftsLoc ? " · " + l.ftsLoc : ""}</span></td>`;
        } else {
          html += "<td>—</td>";
        }
      });
      html += "</tr>";
    });
    table.innerHTML = html;
  }

  function afficherProduction(lignes) {
    const table = document.getElementById("suiviProductionTable");
    const moyenneEl = document.getElementById("suiviCadenceMoyenne");

    if (lignes.length === 0) {
      table.innerHTML = "<tr><td>Aucune donnée de production enregistrée.</td></tr>";
      moyenneEl.textContent = "";
      return;
    }

    let html = "<tr><th>Date</th><th>Nb pieux</th><th>Longueur totale (m)</th><th>Longueur moyenne/pieu (m)</th></tr>";
    lignes.forEach((l) => {
      html += `<tr><td>${l.date}</td><td>${l.nbPieux}</td><td>${l.longueurTotale.toFixed(2)}</td><td>${l.longueurMoyenne.toFixed(2)}</td></tr>`;
    });
    table.innerHTML = html;

    const cadenceMoyenne = lignes.reduce((sum, l) => sum + l.longueurTotale, 0) / lignes.length;
    moyenneEl.textContent = `Cadence moyenne : ${cadenceMoyenne.toFixed(1)} ml/jour sur ${lignes.length} jour${lignes.length > 1 ? "s" : ""} de rapport enregistrés.`;
  }

  if (window.FTSAuth) {
    FTSAuth.onAuthChange(async (signedIn) => {
      if (signedIn) {
        const info = await FTSAuth.getUserInfo();
        adminAccountInfo.textContent = info ? info.email : "Connecté";
        userDot.classList.add("online");
        afficherJoursDepuisOuverture();
        chargerSuivi();
      } else {
        adminAccountInfo.textContent = "Non connecté";
        userDot.classList.remove("online");
      }
    });
    FTSAuth.init();
    if (FTSAuth.isSignedIn()) {
      FTSAuth.getUserInfo().then((info) => {
        adminAccountInfo.textContent = info ? info.email : "Connecté";
        userDot.classList.add("online");
      });
      afficherJoursDepuisOuverture();
      chargerSuivi();
    } else {
      suiviStatus.textContent = "Connecte-toi depuis le dashboard principal, puis reviens sur cette page.";
    }
  }
});
</script>
</body>
</html>
