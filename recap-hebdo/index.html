<title>FTS — Récapitulatif Hebdomadaire</title>
<link rel="stylesheet" href="../css/dashboard.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
.rh-topbar-right { display: flex; align-items: center; gap: 14px; }
.rh-body { max-width: 1400px; margin: 24px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 18px; }

.rh-nav-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; justify-content: space-between; }
.rh-nav-left { display: flex; align-items: center; gap: 12px; }
.rh-nav-btn {
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: white;
  cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
}
.rh-nav-title { font-weight: 800; font-size: 1.15rem; }
.rh-nav-sub { font-size: 0.82rem; color: var(--text-sub); }
.rh-btn-actuelle {
  background: white; border: 1px solid var(--fts-yellow); color: var(--anthracite); font-weight: 700;
  border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 0.82rem;
}
.rh-legende { display: flex; gap: 14px; flex-wrap: wrap; font-size: 0.78rem; color: var(--text-sub); align-items: center; }
.rh-legende .item { display: flex; align-items: center; gap: 5px; }
.rh-legende .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

.rh-layout { display: grid; grid-template-columns: 1fr 340px; gap: 18px; align-items: start; }
.rh-section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-sub); font-weight: 700; margin-bottom: 10px; }

.rh-semaine-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
.rh-jour-col { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 10px; min-height: 140px; }
.rh-jour-col.aujourdhui { border-color: var(--fts-yellow); border-width: 2px; box-shadow: 0 0 0 1px var(--fts-yellow); }
.rh-jour-nom { font-size: 0.68rem; text-transform: uppercase; color: var(--text-sub); font-weight: 700; }
.rh-jour-num { font-size: 1.2rem; font-weight: 800; color: var(--anthracite); margin-bottom: 8px; }
.rh-jour-col.aujourdhui .rh-jour-num { display: inline-block; background: var(--fts-yellow); border-radius: 50%; width: 26px; height: 26px; line-height: 26px; text-align: center; font-size: 0.95rem; }
.rh-jour-vide { font-size: 0.76rem; color: var(--text-sub); margin-top: 6px; }

.rh-chantier-bloc { border-left: 3px solid #999; border-radius: 8px; background: var(--bg); padding: 7px 9px; margin-bottom: 8px; }
.rh-chantier-nom { font-size: 0.68rem; font-weight: 800; color: var(--anthracite); line-height: 1.2; margin-bottom: 4px; }
.rh-entree-row { display: flex; justify-content: space-between; align-items: center; gap: 6px; font-size: 0.74rem; padding: 2px 0; }
.rh-entree-nom { display: flex; align-items: center; gap: 4px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rh-entree-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.rh-entree-val { font-weight: 700; color: var(--text-sub); white-space: nowrap; flex-shrink: 0; }
.rh-gd-tag { background: var(--anthracite); color: var(--fts-yellow); font-size: 0.6rem; font-weight: 800; padding: 1px 5px; border-radius: 6px; margin-left: 3px; }

.rh-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.rh-panel-head { background: var(--anthracite); color: white; padding: 12px 16px; }
.rh-panel-head .titre { font-weight: 800; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
.rh-panel-head .titre .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fts-yellow); }
.rh-panel-head .sous { font-size: 0.72rem; color: #C9CBCF; margin-top: 2px; }
.rh-panel-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

.rh-recap-item { display: flex; align-items: center; gap: 10px; }
.rh-recap-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--anthracite); color: white;
  display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; flex-shrink: 0;
}
.rh-recap-info { flex: 1; min-width: 0; }
.rh-recap-nom { font-weight: 700; font-size: 0.85rem; }
.rh-recap-detail { font-size: 0.72rem; color: var(--text-sub); }
.rh-recap-total { background: var(--bg); border-radius: 12px; padding: 4px 10px; font-size: 0.8rem; font-weight: 800; white-space: nowrap; }
.rh-recap-total .gd { display: block; font-size: 0.62rem; font-weight: 700; color: var(--yellow-icon); text-align: center; }

.rh-total-row { border-top: 1px solid var(--border); padding-top: 10px; display: flex; justify-content: space-between; align-items: baseline; }
.rh-total-label { font-size: 0.8rem; color: var(--text-sub); }
.rh-total-sub { font-size: 0.7rem; color: var(--text-sub); }
.rh-total-val { font-size: 1.3rem; font-weight: 800; color: var(--anthracite); }

.rh-export-btn {
  background: var(--fts-yellow); color: var(--anthracite); border: none; border-radius: 10px;
  padding: 12px; font-weight: 800; font-size: 0.85rem; cursor: pointer; width: 100%; margin: 4px 0 12px 0;
}

.rh-chantier-actif-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid var(--border); }
.rh-chantier-actif-row:first-child { border-top: none; }
.rh-chantier-actif-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.rh-chantier-actif-info { flex: 1; min-width: 0; }
.rh-chantier-actif-code { font-size: 0.68rem; color: var(--text-sub); font-weight: 700; }
.rh-chantier-actif-nom { font-size: 0.82rem; font-weight: 700; }
.rh-chantier-actif-jours { text-align: right; font-size: 0.72rem; color: var(--text-sub); white-space: nowrap; }
.rh-chantier-actif-jours .n { font-size: 1rem; font-weight: 800; color: var(--anthracite); display: block; }

@media (max-width: 1000px) {
  .rh-layout { grid-template-columns: 1fr; }
  .rh-semaine-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 640px) {
  .rh-semaine-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <div style="line-height:1.2">
      <div style="font-weight:800;font-size:1.05rem;color:#fff" id="rhTitre">Récapitulatif Hebdomadaire</div>
      <div class="brand-sub" id="rhSousTitre">Pointage FTS · Heures &amp; Grand Déplacement</div>
    </div>

  <div class="rh-topbar-right">
    <div class="user-chip"><span class="user-dot" id="userDot"></span><span id="adminAccountInfo">Non connecté</span></div>

<main class="rh-body">

  <a href="../nouveau-chantier/index.html" class="retour-lien" style="color:var(--text-sub);font-size:0.85rem;text-decoration:none">← Retour au dashboard</a>

  <div class="rh-nav-row">
    <div class="rh-nav-left">
      <button type="button" class="rh-nav-btn" id="semainePrecBtn">‹</button>
      <button type="button" class="rh-nav-btn" id="semaineSuivBtn">›</button>
      <div>
        <div class="rh-nav-title" id="semaineTitre">Semaine —</div>
        <div class="rh-nav-sub" id="semaineSous">—</div>
      </div>
      <button type="button" class="rh-btn-actuelle" id="semaineActuelleBtn">Semaine actuelle</button>

    <div class="rh-legende" id="legendeChantiers"></div>
  </div>

  <div class="rh-layout">
    <div>
      <div class="rh-section-title">Calendrier de la semaine</div>
      <div class="rh-semaine-grid" id="semaineGrid"></div>
    </div>

    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="rh-panel">
        <div class="rh-panel-head">
          <div class="titre"><span class="dot"></span><span id="recapTitre">Récapitulatif</span></div>
          <div class="sous" id="recapSous">—</div>
        </div>
        <div class="rh-panel-body" id="recapBody"></div>
        <div class="rh-panel-body" style="padding-top:0">
          <div class="rh-total-row">
            <div>
              <div class="rh-total-label" id="totalLabel">Total heures semaine</div>
              <div class="rh-total-sub" id="totalSous">—</div>

            <div class="rh-total-val" id="totalVal">0</div>
          </div>

      <div class="rh-panel">
        <div class="rh-panel-head">
          <div class="titre"><span class="dot"></span>Chantiers actifs cette semaine</div>
          <div class="sous" id="chantiersActifsSous">—</div>

  <p class="form-status" id="rhStatus"></p>

<script src="../js/auth.js"></script>
<script src="../js/drive.js"></script>
<script src="../js/sheets.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(window.location.search);
  const type = params.get("type") === "materiel" ? "materiel" : "personnel";
  const onglet = type === "materiel" ? "Materiel" : "Personnel";
  const estMateriel = type === "materiel";

  document.title = estMateriel ? "FTS — Récapitulatif Hebdomadaire Matériel" : "FTS — Récapitulatif Hebdomadaire Personnel";
  document.getElementById("rhSousTitre").textContent = estMateriel
    ? "Pointage Matériel FTS · Statuts machines"
    : "Pointage personnel FTS · Heures & Grand Déplacement";
  document.getElementById("recapTitre").textContent = estMateriel ? "Récapitulatif matériel" : "Récapitulatif personnel";
  document.getElementById("totalLabel").textContent = estMateriel ? "Total jours d'activité" : "Total heures semaine";

  const PALETTE = ["#4C82F0", "#EE7C93", "#3FAE63", "#E8B923", "#9B6FD8", "#3A86FF", "#E24C4C", "#26A69A"];
  const couleurParChantier = {};
  function couleurChantier(nom) {
    if (!couleurParChantier[nom]) {
      const i = Object.keys(couleurParChantier).length % PALETTE.length;
      couleurParChantier[nom] = PALETTE[i];
    }
    return couleurParChantier[nom];
  }

  const JOURS = ["LUNDI", "MARDI", "MERCREDI", "JEUDI", "VENDREDI", "SAMEDI"];

  function lundiDeLaSemaine(d) {
    const date = new Date(d);
    const jour = date.getDay(); // 0 = dimanche
    const diff = jour === 0 ? -6 : 1 - jour;
    date.setDate(date.getDate() + diff);
    date.setHours(0, 0, 0, 0);
    return date;
  }

  function isoDate(d) { return d.toISOString().slice(0, 10); }
  function frDate(d) { const [a, m, j] = isoDate(d).split("-"); return `${j}/${m}/${a}`; }
  function numeroSemaine(d) {
    const t = new Date(d);
    t.setHours(0, 0, 0, 0);
    t.setDate(t.getDate() + 3 - ((t.getDay() + 6) % 7));
    const s = new Date(t.getFullYear(), 0, 4);
    return 1 + Math.round(((t - s) / 86400000 - 3 + ((s.getDay() + 6) % 7)) / 7);
  }

  let lundiCourant = lundiDeLaSemaine(new Date());

  async function chargerSemaine() {
    const status = document.getElementById("rhStatus");
    if (!window.FTSAuth || !FTSAuth.isSignedIn()) { status.textContent = "Connecte-toi d'abord."; return; }
    if (!window.FTSSheets) { status.textContent = "Erreur : module Sheets non chargé."; return; }

    const jours = [];
    for (let i = 0; i < 6; i++) {
      const d = new Date(lundiCourant);
      d.setDate(d.getDate() + i);
      jours.push(d);
    }
    const samedi = jours[5];

    document.getElementById("semaineTitre").textContent = `Semaine ${numeroSemaine(lundiCourant)} — ${lundiCourant.getFullYear()}`;
    document.getElementById("semaineSous").textContent =
      `Du lundi ${lundiCourant.getDate()} ${lundiCourant.toLocaleDateString("fr-FR", { month: "long" })} au samedi ${samedi.getDate()} ${samedi.toLocaleDateString("fr-FR", { month: "long" })} ${samedi.getFullYear()}`;

    status.textContent = "Chargement...";
    try {
      const entrees = await FTSSheets.listerPointageToutesChantiers(onglet, isoDate(lundiCourant), isoDate(samedi));
      status.textContent = "";
      afficherSemaine(jours, entrees);
    } catch (err) {
      console.error(err);
      status.textContent = `Erreur : ${err.message}`;
    }
  }

  function initiales(nom) {
    return nom.split(/\s+/).filter(Boolean).slice(0, 2).map((p) => p[0].toUpperCase()).join("");
  }

  function afficherSemaine(jours, entrees) {
    // Reset palette pour une correspondance stable chantier -> couleur sur la semaine affichée
    Object.keys(couleurParChantier).forEach((k) => delete couleurParChantier[k]);

    const parJourFR = {};
    jours.forEach((d) => { parJourFR[frDate(d)] = []; });
    entrees.forEach((e) => {
      const dFR = e.cols[0];
      if (parJourFR[dFR]) parJourFR[dFR].push(e);
    });

    // Légende chantiers actifs cette semaine
    const chantiersSemaine = [...new Set(entrees.map((e) => e.chantierName))];
    chantiersSemaine.forEach((c) => couleurChantier(c)); // fige l'ordre de couleur
    const legende = document.getElementById("legendeChantiers");
    legende.innerHTML = chantiersSemaine.map((c) => {
      const code = c.split(/\s+/)[0];
      const nom = c.slice(code.length).trim();
      return `<span class="item"><span class="dot" style="background:${couleurChantier(c)}"></span>${escapeHtmlRH(code)} ${escapeHtmlRH(nom.split(" ").slice(0, 2).join(" "))}</span>`;
    }).join("");

    // Grille calendrier
    const aujourdhuiFR = frDate(new Date());
    const grid = document.getElementById("semaineGrid");
    grid.innerHTML = jours.map((d, i) => {
      const dFR = frDate(d);
      const estAuj = dFR === aujourdhuiFR;
      const entreesJour = parJourFR[dFR] || [];
      const parChantier = {};
      entreesJour.forEach((e) => {
        if (!parChantier[e.chantierName]) parChantier[e.chantierName] = [];
        parChantier[e.chantierName].push(e);
      });

      const blocs = Object.keys(parChantier).map((nomChantier) => {
        const code = nomChantier.split(/\s+/)[0];
        const nom = nomChantier.slice(code.length).trim();
        const couleur = couleurChantier(nomChantier);
        const lignes = parChantier[nomChantier].map((e) => {
          if (estMateriel) {
            const [, machine, statut] = e.cols;
            return `<div class="rh-entree-row"><span class="rh-entree-nom"><span class="rh-entree-dot" style="background:${DOT_COULEUR_STATUT[statut] || "#888"}"></span>${escapeHtmlRH(machine)}</span><span class="rh-entree-val">${escapeHtmlRH(statut)}</span></div>`;
          }
          const [, nomP, , gd, heures] = e.cols;
          return `<div class="rh-entree-row"><span class="rh-entree-nom">${escapeHtmlRH(nomP)}${gd === "GD" ? '<span class="rh-gd-tag">GD</span>' : ""}</span><span class="rh-entree-val">${heures ? escapeHtmlRH(heures) + "h" : ""}</span></div>`;
        }).join("");
        return `
          <div class="rh-chantier-bloc" style="border-left-color:${couleur}">
            <div class="rh-chantier-nom">${escapeHtmlRH(code)}<br>${escapeHtmlRH(nom)}</div>
            ${lignes}
          </div>`;
      }).join("");

      return `
        <div class="rh-jour-col ${estAuj ? "aujourdhui" : ""}">
          <div class="rh-jour-nom">${JOURS[i]}</div>
          <div class="rh-jour-num">${d.getDate().toString().padStart(2, "0")}</div>
          ${blocs || '<div class="rh-jour-vide">Aucune activité</div>'}
        </div>`;
    }).join("");

    // Récapitulatif (par personne ou par machine)
    afficherRecap(entrees, chantiersSemaine.length, jours);
  }

  const DOT_COULEUR_STATUT = { TRAVAIL: "#3FAE63", PANNE: "#E24C4C", ARRET: "#9AA0AA", TRANSPORT: "#4C82F0" };

  function afficherRecap(entrees, nbChantiers, jours) {
    const body = document.getElementById("recapBody");
    const parCle = {};

    entrees.forEach((e) => {
      const cle = estMateriel ? e.cols[1] : e.cols[1]; // nom machine OU nom personne
      if (!parCle[cle]) parCle[cle] = { nom: cle, entrees: [], chantiers: new Set(), joursSet: new Set() };
      parCle[cle].entrees.push(e);
      parCle[cle].chantiers.add(e.chantierName);
      parCle[cle].joursSet.add(e.cols[0]);
    });

    const items = Object.values(parCle);

    if (estMateriel) {
      items.forEach((it) => {
        it.jours = it.joursSet.size;
        it.travail = it.entrees.filter((e) => e.cols[2] === "TRAVAIL").length;
        it.panne = it.entrees.filter((e) => e.cols[2] === "PANNE").length;
      });
      items.sort((a, b) => b.jours - a.jours);
      body.innerHTML = items.map((it) => `
        <div class="rh-recap-item">
          <div class="rh-recap-avatar" style="background:${DOT_COULEUR_STATUT.TRAVAIL}">${initiales(it.nom)}</div>
          <div class="rh-recap-info">
            <div class="rh-recap-nom">${escapeHtmlRH(it.nom)}</div>
            <div class="rh-recap-detail">${[...it.chantiers].length} chantier${[...it.chantiers].length > 1 ? "s" : ""} · ${it.jours} jour${it.jours > 1 ? "s" : ""}${it.panne ? ` · ${it.panne} panne${it.panne > 1 ? "s" : ""}` : ""}</div>
          </div>
          <div class="rh-recap-total">${it.jours}j</div>
        </div>`).join("") || '<p class="form-status">Aucune donnée sur cette période.</p>';

      const totalJours = items.reduce((s, it) => s + it.jours, 0);
      document.getElementById("totalVal").textContent = totalJours;
      document.getElementById("totalSous").textContent = `${items.length} machine${items.length > 1 ? "s" : ""}`;
    } else {
      items.forEach((it) => {
        it.jours = it.joursSet.size;
        it.heures = it.entrees.reduce((s, e) => s + (parseFloat((e.cols[4] || "").replace(",", ".")) || 0), 0);
        it.gd = it.entrees.filter((e) => e.cols[3] === "GD").length;
      });
      items.sort((a, b) => b.heures - a.heures);
      body.innerHTML = items.map((it) => `
        <div class="rh-recap-item">
          <div class="rh-recap-avatar">${initiales(it.nom)}</div>
          <div class="rh-recap-info">
            <div class="rh-recap-nom">${escapeHtmlRH(it.nom)}</div>
            <div class="rh-recap-detail">${[...it.chantiers].length > 1 ? [...it.chantiers].length + " chantiers" : escapeHtmlRH([...it.chantiers][0]?.split(/\s+/).slice(1, 3).join(" ") || "")} · ${it.jours} jour${it.jours > 1 ? "s" : ""}</div>
          </div>
          <div class="rh-recap-total">${it.heures.toFixed(1)}h${it.gd ? `<span class="gd">GD x${it.gd}j</span>` : ""}</div>
        </div>`).join("") || '<p class="form-status">Aucune donnée sur cette période.</p>';

      const totalHeures = items.reduce((s, it) => s + it.heures, 0);
      const totalGD = items.reduce((s, it) => s + it.gd, 0);
      document.getElementById("totalVal").textContent = `${totalHeures.toFixed(0)}h`;
      document.getElementById("totalSous").textContent = `${items.length} personne${items.length > 1 ? "s" : ""} · ${totalGD} jour${totalGD > 1 ? "s" : ""} GD au total`;
    }

    document.getElementById("recapSous").textContent = estMateriel
      ? "Machines FTS et location · Sem."
      : "Personnel FTS et intérim · Sem.";

    // Chantiers actifs cette semaine (panneau bas droite)
    const parChantierActivite = {};
    entrees.forEach((e) => {
      if (!parChantierActivite[e.chantierName]) parChantierActivite[e.chantierName] = new Set();
      parChantierActivite[e.chantierName].add(e.cols[0]);
    });
    const chantiersActifs = Object.keys(parChantierActivite);
    document.getElementById("chantiersActifsSous").textContent = `${chantiersActifs.length} chantier${chantiersActifs.length > 1 ? "s" : ""} · Sem.`;
    document.getElementById("chantiersActifsBody").innerHTML = chantiersActifs.map((nomChantier) => {
      const code = nomChantier.split(/\s+/)[0];
      const nom = nomChantier.slice(code.length).trim();
      const nbJours = parChantierActivite[nomChantier].size;
      return `
        <div class="rh-chantier-actif-row">
          <span class="rh-chantier-actif-dot" style="background:${couleurChantier(nomChantier)}"></span>
          <div class="rh-chantier-actif-info">
            <div class="rh-chantier-actif-code">${escapeHtmlRH(code)}</div>
            <div class="rh-chantier-actif-nom">${escapeHtmlRH(nom)}</div>
          </div>
          <div class="rh-chantier-actif-jours"><span class="n">${nbJours}j</span>jours actif</div>
        </div>`;
    }).join("") || '<p class="form-status">Aucun chantier actif.</p>';
  }

  function escapeHtmlRH(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function exporterCSV() {
    const lignes = estMateriel
      ? [["Date", "Chantier", "Machine", "Statut", "FTS/LOC"]]
      : [["Date", "Chantier", "Nom", "Type", "GD", "Heures"]];

    const jours = [];
    for (let i = 0; i < 6; i++) { const d = new Date(lundiCourant); d.setDate(d.getDate() + i); jours.push(d); }

    FTSSheets.listerPointageToutesChantiers(onglet, isoDate(lundiCourant), isoDate(jours[5])).then((entrees) => {
      entrees.forEach((e) => lignes.push([e.cols[0], e.chantierName, ...e.cols.slice(1)]));
      const csv = lignes.map((l) => l.map((v) => `"${String(v ?? "").replace(/"/g, '""')}"`).join(";")).join("\r\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `Pointage_${type}_semaine_${numeroSemaine(lundiCourant)}_${lundiCourant.getFullYear()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });
  }

  document.getElementById("exportTopBtn").addEventListener("click", exporterCSV);

  document.getElementById("semainePrecBtn").addEventListener("click", () => {
    lundiCourant.setDate(lundiCourant.getDate() - 7);
    chargerSemaine();
  });
  document.getElementById("semaineSuivBtn").addEventListener("click", () => {
    lundiCourant.setDate(lundiCourant.getDate() + 7);
    chargerSemaine();
  });
  document.getElementById("semaineActuelleBtn").addEventListener("click", () => {
    lundiCourant = lundiDeLaSemaine(new Date());
    chargerSemaine();
  });

  if (window.FTSAuth) {
    FTSAuth.onAuthChange(async (signedIn) => {
      const adminAccountInfo = document.getElementById("adminAccountInfo");
      const userDot = document.getElementById("userDot");
      if (signedIn) {
        const info = await FTSAuth.getUserInfo();
        adminAccountInfo.textContent = info ? info.email : "Connecté";
        userDot.classList.add("online");
        chargerSemaine();
      } else {
        adminAccountInfo.textContent = "Non connecté";
        userDot.classList.remove("online");
      }
    });
    FTSAuth.init();
    if (FTSAuth.isSignedIn()) {
      FTSAuth.getUserInfo().then((info) => {
        document.getElementById("adminAccountInfo").textContent = info ? info.email : "Connecté";
        document.getElementById("userDot").classList.add("online");
      });
      chargerSemaine();
    } else {
      document.getElementById("rhStatus").textContent = "Connecte-toi depuis le dashboard principal, puis reviens sur cette page.";
    }
  }
});
</script>
</body>
</html>
